<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENCYCLOPÉDIE RÉPARATION PRO</title>
    <style>
        :root { --main: #00d4ff; --bg: #0a0c10; --card: #161b22; --text: #e6edf3; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .header { background: var(--card); padding: 25px; text-align: center; border-bottom: 3px solid var(--main); }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: var(--main); }

        .category-title { padding: 20px 5% 10px; font-size: 14px; font-weight: bold; color: #8b949e; text-transform: uppercase; border-bottom: 1px solid var(--border); margin: 0 5%; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 5%; }
        
        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 20px 10px; text-align: center; transition: 0.2s; cursor: pointer;
        }
        .card:active { transform: scale(0.95); border-color: var(--main); }
        .card h3 { margin: 0; font-size: 14px; color: #fff; }
        .card p { margin: 8px 0 0; font-size: 11px; color: var(--main); font-weight: bold; }

        /* MODAL FULLSCREEN */
        #content-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 1000; overflow-y: auto;
        }
        .modal-header { padding: 20px; background: var(--card); border-bottom: 1px solid var(--main); display: flex; align-items: center; }
        .back-btn { background: var(--main); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; margin-right: 15px; }
        
        .content-body { padding: 25px 5%; line-height: 1.6; }
        .content-body h2 { color: var(--main); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tech-box { background: #1c2128; border-left: 4px solid var(--main); padding: 15px; margin: 20px 0; font-size: 14px; }
        .arabic { direction: rtl; color: var(--main); font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header"><h1>TECH REPAIR BIBLE v1.0</h1></div>

    <div class="category-title">1. ÉQUIPEMENTS DE L'ATELIER</div>
    <div class="grid" id="grid-tools"></div>

    <div class="category-title">2. COMPOSANTS ÉLECTRONIQUES</div>
    <div class="grid" id="grid-comp"></div>

    <div class="category-title">3. PROTOCOLES DE MESURE</div>
    <div class="grid" id="grid-measure"></div>

    <!-- MODAL POUR APPRENDRE -->
    <div id="content-modal">
        <div class="modal-header">
            <button class="back-btn" onclick="closeContent()">⬅ RETOUR</button>
            <h1 id="modal-title" style="font-size:18px; margin:0;">DÉTAILS</h1>
        </div>
        <div class="content-body" id="modal-body"></div>
    </div>

    <script>
        const database = {
            tools: [
                { t: "STATION AIR CHAUD", p: "HOT AIR STATION", ar: "هواء ساخن", d: "Utilisée pour dessouder les circuits intégrés (IC). Température moyenne : 350-380°C. Débit d'air : 40-60%." },
                { t: "FER À SOUDER", p: "SOLDERING IRON", ar: "كاوية لحam", d: "Pour les soudures de précision. Utilisez une panne fine pour les composants CMS et une panne large pour les connecteurs de batterie." },
                { t: "POWER SUPPLY", p: "DC POWER SUPPLY", ar: "باور سبلاي", d: "Permet d'injecter du courant pour détecter les courts-circuits. Si l'ampérage monte direct à 2A ou plus : COURT-CIRCUIT." }
            ],
            comp: [
                { t: "CONDENSATEUR", p: "CAPACITOR (C)", ar: "مكثف", d: "Rôle : Filtrage et stockage. Un condensateur en court-circuit (relié à la masse) empêche le téléphone de s'allumer." },
                { t: "BOBINE", p: "COIL / INDUCTOR (L)", ar: "ملف / وشيعة", d: "Rôle : Filtrage et Boost (élévation de tension pour le rétroéclairage). Si elle est grillée, le circuit est coupé." },
                { t: "DIODE", p: "DIODE (D)", ar: "ديود", d: "Laisse passer le courant dans un seul sens. Protège les circuits contre les inversions de polarité." },
                { t: "IC POWER (PMIC)", p: "POWER MANAGEMENT", ar: "آيسي الباور", d: "Le cerveau de l'énergie. Il reçoit la tension batterie et la redistribue à tous les autres composants." }
            ],
            measure: [
                { t: "MODE DIODE", p: "DIODE MODE", ar: "وضع الديود", d: "La mesure la plus importante. Fil rouge à la masse (GND), fil noir sur le point à tester. On cherche une 'valeur de chute de tension'." },
                { t: "CONTINUITÉ", p: "CONTINUITY", ar: "الجرس", d: "Pour vérifier si un fil est coupé ou si une ligne positive est touchée par la masse (bip au sol)." }
            ]
        };

        function renderGrids() {
            render('grid-tools', database.tools);
            render('grid-comp', database.comp);
            render('grid-measure', database.measure);
        }

        function render(id, items) {
            let html = "";
            items.forEach(item => {
                html += `<div class="card" onclick="openContent('${item.t}', '${item.p}', '${item.ar}', '${item.d}')">
                            <h3>${item.t}</h3>
                            <p>${item.p}</p>
                         </div>`;
            });
            document.getElementById(id).innerHTML = html;
        }

        function openContent(t, p, ar, d) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-body').innerHTML = `
                <h2>${t} / ${p}</h2>
                <div class="arabic">${ar}</div>
                <div class="tech-box">
                    <strong>FICHE TECHNIQUE :</strong><br><br>
                    ${d}
                </div>
                <p style="color:#8b949e; font-size:13px;">Consultez les schémas (ZXW / DZKJ) pour localiser ce composant sur la carte mère.</p>
            `;
            document.getElementById('content-modal').style.display = 'block';
        }

        function closeContent() { document.getElementById('content-modal').style.display = 'none'; }

        renderGrids();
    </script>
</body>
</html>
