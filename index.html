<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repair Academy</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: #222; border: 1px solid #444; color: #fff; 
            border-radius: 8px; font-size: 18px; cursor: pointer;
        }
        .btn:active { background: #333; }
        #content { margin-top: 20px; padding: 15px; border: 1px dashed #555; display: none; }
    </style>
</head>
<body>
    <h2>🛠 REPAIR ACADEMY</h2>
    <button class="btn" onclick="show('CPU')">💻 CPU</button>
    <button class="btn" onclick="show('NAND')">💾 NAND</button>
    <button class="btn" onclick="show('AUDIO')">🔊 AUDIO</button>
    <button class="btn" onclick="show('WIFI')">📶 WIFI</button>
    <button class="btn" onclick="alert('Besoin d\'aide ? Contactez @votre_pseudo')">❓ HELP</button>

    <div id="content">
        <h3 id="title"></h3>
        <p id="desc"></p>
        <button class="btn" onclick="hide()">⬅ BACK</button>
    </div>

    <script>
        function show(cat) {
            document.getElementById('title').innerText = "Catégorie : " + cat;
            document.getElementById('desc').innerText = "Informations techniques pour " + cat + " à venir...";
            document.getElementById('content').style.display = 'block';
            // On cache les boutons du haut pour faire de la place
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(b => { if(b.innerText !== '⬅ BACK') b.style.display = 'none'; });
        }

        function hide() {
            document.getElementById('content').style.display = 'none';
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(b => b.style.display = 'block');
        }
    </script>
</body>
</html>
