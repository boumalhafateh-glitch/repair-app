<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Academy</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
    margin:0;
    padding:20px;
}

.card {
    background:#1e1e1e;
    padding:20px;
    margin:10px;
    border-radius:12px;
}

button {
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0088cc;
    color:white;
    width:100%;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>MASTER REPAIR ACADEMY</h2>

<div class="card">
    <h3>📊 Ton niveau</h3>
    <p id="level">Chargement...</p>
</div>

<div class="card">
    <h3>📚 Chapitres</h3>
    <button onclick="openChapter(1)">Multimètre</button>
    <button onclick="openChapter(2)">Composants</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// récupérer user Telegram
let user = tg.initDataUnsafe?.user?.id;

// simulation niveau (sera remplacé par backend)
document.getElementById("level").innerText = "Niveau 1";

function openChapter(id){
    tg.sendData(JSON.stringify({
        action:"open_chapter",
        chapter:id
    }));
    tg.close();
}
</script>

</body>
</html>
