<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Repair Kombat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --primary: #f3ba2f; --bg: #000000; --card: #1c1f24; 
            --text: #ffffff; --success: #27ad75; --border: #32363c;
        }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; user-select: none;
        }

        /* HEADER TYPE HAMSTER */
        .top-bar { padding: 15px; display: flex; justify-content: space-between; background: #15181c; border-bottom: 2px solid var(--border); }
        .stat-box { text-align: center; flex: 1; }
        .stat-label { font-size: 10px; color: #848b94; text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: bold; color: var(--primary); }

        /* SCORE PRINCIPAL */
        .main-score { text-align: center; padding: 20px 0; }
        .balance { font-size: 42px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .coin { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 15px var(--primary); }

        /* ZONE DE CLIC */
        .click-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .circle-outer { 
            width: 250px; height: 250px; background: radial-gradient(circle, #2d333b 0%, #1c1f24 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 8px solid #32363c; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transition: transform 0.05s;
        }
        .circle-outer:active { transform: scale(0.95); }
        .main-icon { font-size: 80px; }

        /* BARRE D'ÉNERGIE */
        .energy-container { padding: 20px; }
        .energy-text { margin-bottom: 5px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .energy-bar { width: 100%; height: 12px; background: #32363c; border-radius: 10px; overflow: hidden; }
        .energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #f3ba2f, #ffea00); transition: width 0.2s; }

        /* NAVIGATION BASSE */
        .nav-tabs { 
            display: flex; background: #1c1f24; padding: 10px 0; 
            border-top: 2px solid var(--border); justify-content: space-around;
        }
        .tab { text-align: center; color: #848b94; font-size: 11px; flex: 1; cursor: pointer; }
        .tab.active { color: var(--primary); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        /* PAGES */
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
        .page.active { display: block; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 15px;
            padding: 15px; position: relative; opacity: 1;
        }
        .card.locked { opacity: 0.5; filter: grayscale(1); }
        .card h3 { margin: 0; font-size: 12px; }
        .card .price { color: var(--primary); font-weight: bold; font-size: 13px; margin-top: 10px; }
        
        /* FLOATING TEXT */
        .float-text {
            position: absolute; color: white; font-weight: 900; font-size: 24px;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <!-- TOP INFO -->
    <div class="top-bar">
        <div class="stat-box">
            <div class="stat-label">Grade</div>
            <div class="stat-value" id="rank">Apprenti</div>
        </div>
        <div class="stat-box" style="border-left: 1px solid #32363c; border-right: 1px solid #32363c;">
            <div class="stat-label">Profit / Hour</div>
            <div class="stat-value" id="pph">+0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Lvl</div>
            <div class="stat-value" id="current-lvl">1</div>
        </div>
    </div>

    <!-- BALANCE -->
    <div class="main-score">
        <div class="balance">
            <div class="coin"></div>
            <span id="balance">0</span>
        </div>
    </div>

    <!-- MAIN GAME PAGE -->
    <div id="game-page" class="page active">
        <div class="click-area" id="tap-zone">
            <div class="circle-outer">
                <div class="main-icon">🛠️</div>
            </div>
        </div>

        <div class="energy-container">
            <div class="energy-text">⚡ <span id="energy-val">1000</span> / 1000</div>
            <div class="energy-bar">
                <div class="energy-fill" id="energy-fill"></div>
            </div>
        </div>
    </div>

    <!-- ACADEMY (MINING) PAGE -->
    <div id="academy-page" class="page">
        <h2 style="color:var(--primary)">Shop & Tools</h2>
        <div class="grid" id="tools-grid">
            <!-- Injecté par JS -->
        </div>
    </div>

    <!-- NAV -->
    <div class="nav-tabs">
        <div class="tab active" onclick="showPage('game-page', this)">
            <span class="tab-icon">🏠</span>Main
        </div>
        <div class="tab" onclick="showPage('academy-page', this)">
            <span class="tab-icon">⚒️</span>Academy
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // DONNÉES
        let state = JSON.parse(localStorage.getItem('rk_state')) || {
            balance: 0,
            pph: 0,
            energy: 1000,
            maxEnergy: 1000,
            lvl: 1,
            unlocked: []
        };

        const tools = [
            { id: 1, t: "Soldering Iron", p: 500, pph: 50, icon: "🔌" },
            { id: 2, t: "Multimeter", p: 2000, pph: 150, icon: "📟" },
            { id: 3, t: "Microscope", p: 10000, pph: 800, icon: "🔬" },
            { id: 4, t: "Thermal Cam", p: 50000, pph: 4500, icon: "🌡️" }
        ];

        // INITIALISATION
        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('pph').innerText = "+" + state.pph.toLocaleString();
            document.getElementById('energy-val').innerText = Math.floor(state.energy);
            document.getElementById('energy-fill').style.width = (state.energy / state.maxEnergy * 100) + "%";
            
            // Grades
            if(state.balance > 100000) document.getElementById('rank').innerText = "Legend";
            else if(state.balance > 10000) document.getElementById('rank').innerText = "Master";
            else document.getElementById('rank').innerText = "Technicien";

            renderShop();
        }

        function renderShop() {
            let html = "";
            tools.forEach(tool => {
                const isOwned = state.unlocked.includes(tool.id);
                html += `
                    <div class="card ${isOwned ? '' : ''}" onclick="buyTool(${tool.id}, ${tool.p}, ${tool.pph})">
                        <div style="font-size:30px">${tool.icon}</div>
                        <h3>${tool.t}</h3>
                        <div class="price">${isOwned ? 'OWNED' : tool.p + ' RP'}</div>
                        <div style="font-size:10px; color:#27ad75">+${tool.pph}/h</div>
                    </div>
                `;
            });
            document.getElementById('tools-grid').innerHTML = html;
        }

        // LOGIQUE CLIC
        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(state.energy >= 1) {
                state.balance += 1;
                state.energy -= 1;
                tg.HapticFeedback.impactOccurred('light');
                createFloatText(e.touches[0].clientX, e.touches[0].clientY);
                updateUI();
                save();
            }
        });

        function createFloatText(x, y) {
            const div = document.createElement('div');
            div.className = 'float-text';
            div.innerText = '+1';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        // ACHATS
        window.buyTool = (id, price, pphAdd) => {
            if(state.unlocked.includes(id)) {
                tg.showAlert("Tu possèdes déjà cet outil !");
                return;
            }
            if(state.balance >= price) {
                state.balance -= price;
                state.pph += pphAdd;
                state.unlocked.push(id);
                tg.HapticFeedback.notificationOccurred('success');
                updateUI();
                save();
            } else {
                tg.showAlert("Pas assez de Repair Points !");
            }
        };

        // PROFIT PASSIF ET ÉNERGIE
        setInterval(() => {
            // Profit par seconde
            if(state.pph > 0) {
                state.balance += (state.pph / 3600);
            }
            // Recharge énergie
            if(state.energy < state.maxEnergy) {
                state.energy = Math.min(state.maxEnergy, state.energy + 1);
            }
            updateUI();
        }, 1000);

        // NAVIGATION
        window.showPage = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        function save() { localStorage.setItem('rk_state', JSON.stringify(state)); }
        
        updateUI();
    </script>
</body>
</html>
