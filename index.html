<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Repair Academy ULTRA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d4ff; --success: #2ecc71; --bg: #05070a; --card-bg: #111418; --border: #1f2937; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .header { padding: 20px; background: #111418; border-bottom: 2px solid var(--primary); text-align: center; }
        .header h1 { color: var(--primary); margin: 0; font-size: 22px; font-weight: 900; }

        .section-title { padding: 15px 5%; color: #666; font-size: 11px; text-transform: uppercase; font-weight: 800; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 5%; }
        
        .card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; 
            padding: 15px 8px; display: flex; flex-direction: column; align-items: center; 
            transition: 0.2s; position: relative; min-height: 80px; justify-content: center;
        }
        .card:active { transform: scale(0.95); border-color: var(--primary); }
        .card h3 { margin: 0; font-size: 13px; text-align: center; color: #fff; }
        .card p { margin: 5px 0 0; font-size: 10px; color: var(--primary); font-weight: bold; }
        
        .locked { filter: grayscale(1); opacity: 0.4; }
        .tag { position: absolute; top: 5px; left: 5px; font-size: 8px; background: var(--primary); color: #000; padding: 2px 5px; border-radius: 3px; font-weight: 900; }

        .btn-sos { background: linear-gradient(90deg, #ff4b2b, #ff416c); color: #fff; padding: 15px; margin: 10px 5%; border-radius: 12px; text-decoration: none; display: block; text-align: center; font-weight: 900; }
        .btn-back { background: #1f2937; color: #fff; padding: 10px; border: none; width: 90%; margin: 10px 5%; border-radius: 8px; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card-bg); margin: 20% auto; padding: 25px; width: 80%; border-radius: 20px; border: 1px solid var(--primary); }
        
        /* QUIZ */
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #1c2128; border: 1px solid var(--border); color: #fff; text-align: left; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="header"><h1>REPAIR ENCYCLOPEDIA</h1></div>
        <div class="section-title">Niveaux d'Expertise</div>
        <div class="grid">
            <div class="card" onclick="nav('niv1')"><h3>NIV 1: TOOLS</h3><p>المعدات</p></div>
            <div class="card" id="card-niv2" onclick="checkLock('niv2')"><h3>NIV 2: COMPONENTS</h3><p>المكونات</p></div>
            <div class="card" id="card-niv3" onclick="checkLock('niv3')"><h3>NIV 3: MULTIMETER</h3><p>القياسات</p></div>
        </div>
        <a href="#" class="btn-sos">🆘 SUPPORT TECHNIQUE VIP</a>
    </div>

    <!-- NIVEAU 1: TOOLS -->
    <div id="niv1" class="page" style="display:none">
        <div class="header"><h1>🛠 EQUIPEMENTS</h1></div>
        <button class="btn-back" onclick="nav('home')">⬅ RETOUR</button>
        <div class="grid" id="grid-tools"></div>
        <button class="btn-sos" style="background:var(--success)" onclick="startQuiz(1)">PASSER LE TEST NIV 1</button>
    </div>

    <!-- NIVEAU 2: COMPONENTS -->
    <div id="niv2" class="page" style="display:none">
        <div class="header"><h1>⚡ COMPOSANTS</h1></div>
        <button class="btn-back" onclick="nav('home')">⬅ RETOUR</button>
        <div class="grid" id="grid-components"></div>
        <button class="btn-sos" style="background:var(--success)" onclick="startQuiz(2)">PASSER LE TEST NIV 2</button>
    </div>

    <!-- NIVEAU 3: MULTIMETER -->
    <div id="niv3" class="page" style="display:none">
        <div class="header"><h1>📟 MODES DE MESURE</h1></div>
        <button class="btn-back" onclick="nav('home')">⬅ RETOUR</button>
        <div class="grid" id="grid-multi"></div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-page" class="page" style="display:none">
        <div class="header"><h1>EXAMEN DE NIVEAU</h1></div>
        <div style="padding:20px;">
            <p id="q-en" style="color:var(--primary); font-weight:bold; font-size:18px;"></p>
            <p id="q-ar" style="direction:rtl; font-size:22px;"></p>
            <div id="options"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h2 id="mTitle" style="color:var(--primary);"></h2>
            <p id="mEn"></p>
            <p id="mAr" style="direction:rtl; color:var(--primary); font-size:18px;"></p>
            <button class="btn-back" style="width:100%; margin:0;" onclick="closeInfo()">COMPRIS</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let progress = JSON.parse(localStorage.getItem('repair_ultra_prog')) || { niv2: false, niv3: false };

        const data = {
            tools: [
                { t: "SOLDERING STATION", en: "Main tool for soldering.", ar: "كاوية اللحام: الأداة الأساسية.", p: "محطة لحام" },
                { t: "HOT AIR STATION", en: "For IC removal.", ar: "الهواء الساخن: لفك الأيسيهات.", p: "هواء ساخن" },
                { t: "DC POWER SUPPLY", en: "Power injection.", ar: "باور سبلاي: حقن الطاقة.", p: "باور سبلاي" },
                { t: "MICROSCOPE", en: "HD Zoom.", ar: "المجهر: فحص البوردة بدقة.", p: "مجهر" },
                { t: "THERMAL CAMERA", en: "Short detection.", ar: "كاميرا حرارية: كشف الشورت.", p: "كاميرا حرارية" }
            ],
            components: [
                { t: "RESISTANCE", en: "Opposes current.", ar: "المقاومة: تعيق التيار.", p: "مقاومة" },
                { t: "CAPACITOR", en: "Stores charge / Filters.", ar: "المكثف: تخزين وتصفية.", p: "مكثف" },
                { t: "COIL / INDUCTOR", en: "Filters & boosts voltage.", ar: "الوشيعة: تصفية ورفع الجهد.", p: "وشيعة" },
                { t: "DIODE", en: "One-way street for current.", ar: "الديود: ممر تيار باتجاه واحد.", p: "ديود" },
                { t: "TRANSISTOR", en: "Electronic switch.", ar: "الترانزستور: مفتاح إلكتروني.", p: "ترانزستور" },
                { t: "PMIC", en: "Main Power Management.", ar: "آيسي الباور الرئيسي.", p: "آيسي باور" },
                { t: "CPU", en: "Processor - Central Brain.", ar: "المعالج: عقل الجهاز.", p: "معالج" },
                { t: "NAND / UFS", en: "Storage memory.", ar: "الذاكرة: تخزين البيانات.", p: "ذاكرة" },
                { t: "TRISTAR / HYDRA", en: "Charging Logic IC.", ar: "آيسي الشحن (ترايستار).", p: "آيسي شحن" },
                { t: "AUDIO CODEC", en: "Manages all sound functions.", ar: "آيسي الصوت: إدارة الصوت.", p: "آيسي صوت" },
                { t: "WIFI / BT CHIP", en: "Wireless communications.", ar: "آيسي الواي فاي والبلوتوث.", p: "واي فاي" }
            ],
            multi: [
                { t: "DIODE MODE", en: "Measuring voltage drop.", ar: "وضع الديود: قياس الممانعة.", p: "⯈|" },
                { t: "CONTINUITY", en: "Checking for shorts/beeps.", ar: "الجرس: فحص المسارات.", p: "🔊" },
                { t: "VOLT DC", en: "Checking line voltages.", ar: "الفولت: قياس الجهد.", p: "V⎓" },
                { t: "OHM METER", en: "Measuring resistance values.", ar: "الأوم: قياس قيمة المقاومة.", p: "Ω" },
                { t: "CAPACITANCE", en: "Checking capacitor health.", ar: "الفاراد: فحص سعة المكثف.", p: "µF" }
            ]
        };

        const quizzes = {
            1: [{ en: "Which tool injects voltage?", ar: "أي أداة تستخدم لحقن الفولت؟", opts: ["DC Power Supply", "Microscope", "Flux"], r: 0 }],
            2: [{ en: "Which IC handles charging logic?", ar: "أي آيسي مسؤول عن منطق الشحن؟", opts: ["CPU", "Tristar", "WiFi"], r: 1 }]
        };

        function initGrids() {
            render('grid-tools', data.tools);
            render('grid-components', data.components);
            render('grid-multi', data.multi);
            updateLockUI();
        }

        function render(id, items) {
            let html = "";
            items.forEach(item => {
                html += `<div class="card" onclick="showInfo('${item.t}', '${item.en}', '${item.ar}')"><h3>${item.t}</h3><p>${item.p}</p></div>`;
            });
            document.getElementById(id).innerHTML = html;
        }

        function showInfo(t, en, ar) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mEn').innerText = en;
            document.getElementById('mAr').innerText = ar;
            document.getElementById('infoModal').style.display = 'block';
        }

        function closeInfo() { document.getElementById('infoModal').style.display = 'none'; }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function checkLock(id) {
            if(progress[id]) nav(id);
            else tg.showAlert("🔒 Verrouillé ! Finissez le quiz du niveau précédent.");
        }

        function startQuiz(lvl) {
            let q = quizzes[lvl][0];
            nav('quiz-page');
            document.getElementById('q-en').innerText = q.en;
            document.getElementById('q-ar').innerText = q.ar;
            let h = "";
            q.opts.forEach((o, i) => h += `<button class="opt-btn" onclick="ans(${lvl}, ${i})">${o}</button>`);
            document.getElementById('options').innerHTML = h;
        }

        function ans(lvl, i) {
            if(i === quizzes[lvl][0].r) {
                let next = "niv" + (lvl + 1);
                progress[next] = true;
                localStorage.setItem('repair_ultra_prog', JSON.stringify(progress));
                tg.showAlert("✅ RÉUSSI ! Niveau débloqué.");
                updateLockUI();
                nav('home');
            } else {
                tg.showAlert("❌ ÉCHEC. Révisez et recommencez.");
                nav('home');
            }
        }

        function updateLockUI() {
            if(!progress.niv2) document.getElementById('card-niv2').classList.add('locked');
            else document.getElementById('card-niv2').classList.remove('locked');
            if(!progress.niv3) document.getElementById('card-niv3').classList.add('locked');
            else document.getElementById('card-niv3').classList.remove('locked');
        }

        initGrids();
    </script>
</body>
</html>
