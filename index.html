<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Repair Academy</title>
    <style>
        :root { --primary: #007bff; --bg: #0d1117; --card-bg: #161b22; --border: #30363d; --text-sec: #8b949e; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .header { padding: 15px 10px; background: #161b22; border-bottom: 2px solid var(--primary); }
        .header h1 { color: var(--primary); margin: 0; font-size: 22px; font-weight: 800; }

        .section-title { text-align: left; padding: 10px 5% 5px; color: var(--primary); font-size: 12px; text-transform: uppercase; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 5%; }
        
        .card { 
            background: var(--card-bg); border: 2px solid var(--border); border-radius: 10px; 
            padding: 10px 5px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; min-height: 60px; transition: 0.2s; 
        }
        .card h3 { margin: 0; font-size: 14px; color: #fff; font-weight: 800; width: 95%; line-height: 1.1; }
        .card p { margin: 3px 0 0; font-size: 11px; color: var(--primary); font-weight: bold; }
        .card.locked { opacity: 0.4; border-style: dashed; }

        /* SOS BUTTON STYLE */
        .btn-sos { 
            background: linear-gradient(45deg, #e74c3c, #c0392b); 
            color: white; 
            padding: 15px; 
            margin: 15px 5%; 
            border-radius: 10px; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            text-decoration: none; 
            font-size: 16px; 
            border: none; 
            text-transform: uppercase;
            cursor: pointer;
            width: 90%;
        }
        
        .full-card { background: var(--card-bg); border: 2px solid var(--primary); border-radius: 10px; padding: 15px; margin: 10px 5%; cursor: pointer; }
        .btn-back { background: #30363d; color: white; padding: 12px; margin: 10px 5%; border-radius: 8px; border: none; width: 90%; font-weight: bold; cursor: pointer; font-size: 14px; }

        .opt-btn { 
            background: #1c2128; border: 2px solid var(--border); color: #fff; 
            width: 90%; padding: 18px 0; margin: 12px 5%; border-radius: 12px; 
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: block; text-align: center;
            transition: 0.2s;
        }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 10% auto; border: 2px solid var(--primary); width: 85%; border-radius: 15px; }
        .modal-body { padding: 20px; text-align: left; }
        .lang-desc { font-size: 15px; margin: 0 0 15px 0; font-weight: 600; line-height: 1.5; }

        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="header"><h1>MASTER REPAIR</h1></div>
        <div class="section-title">Catalogue</div>
        <div class="grid">
            <div class="card" onclick="nav('niv1')"><h3>🛠 NIV 1</h3><p>TOOLS / الأدوات</p></div>
            <div class="card" onclick="nav('niv2')"><h3>⚡ NIV 2</h3><p>COMPONENTS / المكونات</p></div>
            <div class="card locked" id="card-niv3" onclick="startTest()"><h3>📟 NIV 3</h3><p>MULTIMETER / القياس</p></div>
            <div class="card locked" id="card-niv4"><h3>📋 NIV 4</h3><p>SCHEMATICS / المخططات</p></div>
        </div>
        <div class="full-card" onclick="startTest()">
            <p style="margin:0; color:var(--primary); font-weight:900; font-size: 18px;">📝 LEVEL TEST / اختبار المستوى</p>
        </div>
        
        <!-- SOS BUTTON FIXED WITH JAVASCRIPT -->
        <button onclick="openSOS()" class="btn-sos">🆘 SOS GROUP / الدعم الفني</button>
    </div>

    <!-- PAGES NIV 1 & NIV 2 (Definitions in script for space) -->
    <div id="niv1" class="page">
        <div class="header"><h1>NIV 1 TOOLS</h1></div>
        <button class="btn-back" onclick="nav('home')">⬅ BACK / عودة</button>
        <div class="grid" id="grid-niv1"></div>
    </div>

    <div id="niv2" class="page">
        <div class="header"><h1>NIV 2 COMPONENTS</h1></div>
        <button class="btn-back" onclick="nav('home')">⬅ BACK / عودة</button>
        <div class="grid" id="grid-niv2"></div>
    </div>

    <div id="quiz-page" class="page">
        <div class="header"><h1>LEVEL QUIZ</h1></div>
        <div style="padding: 20px;">
            <p id="q-en" style="font-weight:900; font-size:18px; color:var(--primary);"></p>
            <p id="q-ar" style="font-weight:bold; font-size:20px; text-align:right; direction:rtl; margin-top:5px;"></p>
        </div>
        <div id="options"></div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <div class="modal-body">
                <h2 id="mTitle" style="color:var(--primary); margin-bottom:15px; font-size:18px; text-transform:uppercase;"></h2>
                <p id="mEn" class="lang-desc"></p>
                <p id="mAr" class="lang-desc" style="text-align:right; direction:rtl; color:var(--primary);"></p>
                <button class="btn-back" style="width:100%; margin:0;" onclick="closeInfo()">OK / تم</button>
            </div>
        </div>
    </div>

    <script>
        // SOS FUNCTION
        function openSOS() {
            window.location.href = "https://t.me/c/3919937885/2";
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openInfo(t, en, ar) {
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mEn').innerText = en;
            document.getElementById('mAr').innerText = ar;
            document.getElementById('infoModal').style.display = 'block';
        }

        function closeInfo() { document.getElementById('infoModal').style.display = 'none'; }

        // ULTRA DETAILED CONTENT
        const tools = [
            {t:'SOLDERING STATION', en:'High-precision thermal station (200-450°C). Uses PID control for stable temperature. Vital for micro-soldering ICs and replacing SMD resistors without damaging the PCB fiber.', ar:'محطة حرارية دقيقة (200-450 درجة). تستخدم نظام التحكم PID لاستقرار الحرارة. حيوية للحام الآيسيهات الدقيق واستبدال المكونات دون إتلاف البوردة.'},
            {t:'HOT AIR STATION', en:'Airflow heating system (100-500°C) for non-contact rework. Used for desoldering BGA chips, charging ports, and melting underfill glue safely.', ar:'نظام تسخين بتدفق الهواء (100-500 درجة). يستخدم لفك آيسيهات BGA، وكونيكتورات الشحن، وإذابة الحماية الصمغية بأمان.'},
            {t:'MULTIMETER', en:'Digital measurement tool for Voltage, Resistance, and Continuity. In mobile repair, used mostly for "Diode Mode" to compare line values and find short circuits.', ar:'أداة قياس رقمية للجهد والمقاومة والاستمرارية. في صيانة الهاتف، تستخدم غالباً في "وضع الديود" لمقارنة القيم وإيجاد الشورت.'},
            {t:'MICROSCOPE', en:'7X-45X magnification. Allows viewing of micro-corrosion, damaged CPU pads, and microscopic solder bridges (shorts) hidden under components.', ar:'تكبير 7-45 مرة. يسمح برؤية التآكل الدقيق، تلف أرجل المعالج، وتماس اللحام المجهري المخفي تحت المكونات.'}
        ];

        const comps = [
            {t:'COIL (Inductor)', en:'Wire-wound component that stores energy in a magnetic field. Acts as a filter in Power lines and is crucial for "Buck/Boost" converters to change voltage levels.', ar:'مكون سلكي ملفوف يخزن الطاقة في مجال مغناطيسي. يعمل كمرشح في خطوط الطاقة وهو ضروري لرفع أو خفض الجهد.'},
            {t:'CAPACITOR', en:'Two-plate component that stores charge. Parallel capacitors act as filters to remove AC ripple from DC lines. A shorted capacitor is the #1 cause of dead phones.', ar:'مكون يخزن الشحنة. تعمل المكثفات المتوازية كمرشحات لإزالة الضجيج الكهربائي. المكثف المسبب للشورت هو السبب الأول لموت الهواتف.'},
            {t:'DIODE', en:'One-way valve for electricity. Protects the motherboard from reverse polarity (battery plugged wrong) and prevents high-voltage spikes (TVS Diode).', ar:'صمام أحادي للكهرباء. يحمي اللوحة الأم من عكس القطبية ويمنع طفرات الجهد العالي.'},
            {t:'IC (CHIP)', en:'The brain of the circuit. A PMIC (Power IC) manages all voltages, while the CPU executes instructions. ICs are BGA based (Ball Grid Array).', ar:'عقل الدائرة. آيسي الباور يدير جميع الجهود، بينما المعالج ينفذ الأوامر. الآيسيهات تعتمد على نظام الكرات (BGA).'}
        ];

        // Populate Grids
        function loadGrid(data, gridId) {
            let h = "";
            data.forEach(item => {
                h += `<div class="card" onclick="openInfo('${item.t}', '${item.en}', '${item.ar}')"><h3>${item.t}</h3><p>DETAILS / تفاصيل</p></div>`;
            });
            document.getElementById(gridId).innerHTML = h;
        }
        loadGrid(tools, 'grid-niv1');
        loadGrid(comps, 'grid-niv2');

        // Quiz Logic
        const allQs = [
            { en: "Which component stores energy in a magnetic field?", ar: "أي مكون يخزن الطاقة في مجال مغناطيسي؟", opts: ["DIODE", "COIL", "FUSE"], r: 1 },
            { en: "What is the unit of electrical resistance?", ar: "ما هي وحدة قياس المقاومة الكهربائية؟", opts: ["VOLT", "OHM", "FARAD"], r: 1 },
            { en: "Tool used for non-contact IC desoldering?", ar: "أداة تستخدم لفك الآيسيهات بدون تلامس؟", opts: ["SOLDERING IRON", "HOT AIR STATION", "TWEEZERS"], r: 1 }
        ];

        let cur = 0; let score = 0;
        function startTest() { cur=0; score=0; nav('quiz-page'); showQ(); }
        function showQ() {
            let q = allQs[cur];
            document.getElementById('q-en').innerText = q.en;
            document.getElementById('q-ar').innerText = q.ar;
            let h = "";
            q.opts.forEach((o, i) => { h += `<button class="opt-btn" onclick="check(${i})">${o}</button>`; });
            document.getElementById('options').innerHTML = h;
        }
        function check(i) {
            if(i === allQs[cur].r) score++;
            cur++;
            if(cur < 3) showQ(); else finish();
        }
        function finish() {
            if(score === 3) {
                alert("PERFECT! NIV 3 UNLOCKED");
                document.getElementById('card-niv3').classList.remove('locked');
                nav('home');
            } else { alert("SCORE: "+score+"/3. TRY AGAIN."); nav('home'); }
        }
    </script>
</body>
</html>
